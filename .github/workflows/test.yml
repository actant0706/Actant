name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile scripts
        run: |
          python -B -m py_compile scripts/actant.py scripts/actantctl.py scripts/actantlib/*.py

      - name: Run tests
        run: |
          python -m unittest discover -s tests
